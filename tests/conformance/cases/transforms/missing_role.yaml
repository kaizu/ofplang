spec_version: "0.0"
types:
  Cup:
    domain: object
processes:
  bad:
    kind: atomic
    inputs:
      xs:
        type: Array<Cup>
        phase: data
    outputs:
      head:
        type: Cup
        phase: data
    objects:
      transform:
        - kind: array_uncons
          inputs:
            xs: inputs.xs
          outputs:
            head: outputs.head
  main:
    kind: atomic
    inputs: {}
    outputs: {}
entry: main
