spec_version: "0.0"
types:
  Cup:
    domain: object
  Plate:
    domain: object
processes:
  bad:
    kind: atomic
    inputs:
      head:
        type: Cup
        phase: data
      tail:
        type: Array<Plate>
        phase: data
    outputs:
      xs:
        type: Array<Cup>
        phase: data
    objects:
      transform:
        - kind: array_cons
          inputs:
            head: inputs.head
            tail: inputs.tail
          outputs:
            xs: outputs.xs
  main:
    kind: atomic
    inputs: {}
    outputs: {}
entry: main
