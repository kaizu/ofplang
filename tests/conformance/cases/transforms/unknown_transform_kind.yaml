spec_version: "0.0"
types:
  Cup:
    domain: object
processes:
  bad:
    kind: atomic
    inputs:
      xs:
        type: Array<Cup>
        phase: data
    outputs:
      ys:
        type: Array<Cup>
        phase: data
    objects:
      transform:
        - kind: array_shuffle
          inputs:
            xs: inputs.xs
          outputs:
            ys: outputs.ys
  main:
    kind: atomic
    inputs: {}
    outputs: {}
entry: main
