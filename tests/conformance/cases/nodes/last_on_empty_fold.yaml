spec_version: "0.0"
features:
  - node_fold
processes:
  step:
    kind: atomic
    inputs:
      item:
        type: Int
        phase: data
    outputs:
      seen:
        type: Int
        phase: data
  main:
    kind: composite
    body:
      nodes:
        - id: loop
          kind: fold
          process: step
          each:
            item:
              value: []
          outputs:
            seen:
              mode: last
      returns: {}
entry: main
