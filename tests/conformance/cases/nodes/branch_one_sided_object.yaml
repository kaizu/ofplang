spec_version: "0.0"
features:
  - node_branch
types:
  Cup:
    domain: object
processes:
  cup_wash:
    kind: atomic
    inputs:
      cup:
        type: Cup
        phase: data
    outputs:
      cup:
        type: Cup
        phase: data
    objects:
      map:
        outputs.cup: inputs.cup
  cup_discard:
    kind: atomic
    inputs:
      cup:
        type: Cup
        phase: data
    outputs: {}
    objects:
      consume:
        - inputs.cup
  main:
    kind: composite
    inputs:
      cup:
        type: Cup
        phase: data
      dirty:
        type: Bool
        phase: data
    body:
      nodes:
        - id: handle
          kind: branch
          condition:
            from: inputs.dirty
          args:
            cup:
              from: inputs.cup
          then:
            process: cup_wash
          else:
            process: cup_discard
      returns: {}
entry: main
