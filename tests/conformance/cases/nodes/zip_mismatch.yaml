spec_version: "0.0"
features:
  - node_map
processes:
  combine:
    kind: atomic
    inputs:
      a:
        type: Int
        phase: data
      b:
        type: Int
        phase: data
    outputs:
      c:
        type: Int
        phase: data
  main:
    kind: composite
    body:
      nodes:
        - id: m
          kind: map
          process: combine
          each:
            a:
              value: [1, 2]
            b:
              value: [1]
      returns: {}
entry: main
