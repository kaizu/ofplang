spec_version: "0.0"
features: []
processes:
  cup_make:
    kind: atomic
    inputs:
      label:
        type: String
        phase: data
    outputs:
      cup:
        type: Cup
        phase: data
    objects:
      create:
        - outputs.cup
  main:
    kind: composite
    body:
      nodes:
        - id: make
          kind: map
          process: cup_make
          each:
            label:
              from: inputs.labels
      returns: {}
    inputs:
      labels:
        type: Array<String>
        phase: data
types:
  Cup:
    domain: object
entry: main
