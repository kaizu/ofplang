spec_version: "0.0"
processes:
  emit:
    kind: atomic
    inputs: {}
    outputs:
      out:
        type: Int
        phase: data
  sink:
    kind: atomic
    inputs:
      x:
        type: Int
        phase: data
    outputs: {}
  main:
    kind: composite
    body:
      nodes:
        - id: e
          process: emit
        - id: s
          process: sink
          bind:
            x:
              from: ghost.out
      returns: {}
entry: main
