spec_version: "0.0"
processes:
  sink:
    kind: atomic
    inputs:
      x:
        type: Int
        phase: data
    outputs: {}
  main:
    kind: composite
    inputs:
      n:
        type: Int
        phase: data
    body:
      nodes:
        - id: s
          process: sink
          bind:
            x:
              from: inputs.n
              value: 3
      returns: {}
entry: main
