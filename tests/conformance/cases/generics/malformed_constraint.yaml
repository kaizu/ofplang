spec_version: "0.0"
traits:
  Washable: {}
processes:
  wash:
    kind: atomic
    type_params:
      O:
        domain: object
    where:
      - "Washable <O>"
    inputs:
      item:
        type: O
        phase: data
    outputs:
      item:
        type: O
        phase: data
    objects:
      map:
        outputs.item: inputs.item
  main:
    kind: atomic
    inputs: {}
    outputs: {}
entry: main
