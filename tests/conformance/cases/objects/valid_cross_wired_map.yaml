spec_version: "0.0"
types:
  Cup:
    domain: object
processes:
  swap:
    kind: atomic
    inputs:
      a:
        type: Cup
        phase: data
      b:
        type: Cup
        phase: data
    outputs:
      a:
        type: Cup
        phase: data
      b:
        type: Cup
        phase: data
    objects:
      map:
        outputs.a: inputs.b
        outputs.b: inputs.a
  main:
    kind: atomic
    inputs: {}
    outputs: {}
entry: main
