spec_version: "0.0"
features:
  - scheduling_policies
processes:
  main:
    kind: composite
    inputs:
      count:
        type: Int
        phase: data
    body:
      nodes: []
      returns: {}
    scheduling:
      policies:
        - object:
            from: inputs.count
          during:
            from: self.start
            to: self.end
          prefer:
            kind: temperature
            value: 4
            unit: C
entry: main
