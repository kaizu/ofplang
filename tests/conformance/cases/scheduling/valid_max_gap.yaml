spec_version: "0.0"
features:
  - scheduling_policies
processes:
  collect:
    kind: atomic
    inputs: {}
    outputs: {}
  analyze:
    kind: atomic
    inputs: {}
    outputs: {}
  main:
    kind: composite
    body:
      nodes:
        - id: collect
          process: collect
        - id: analyze
          process: analyze
      returns: {}
    scheduling:
      policies:
        - during:
            from: collect.end
            to: analyze.start
          prefer:
            kind: max_gap
            value: 10
            unit: min
entry: main
