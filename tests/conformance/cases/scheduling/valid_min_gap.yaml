spec_version: "0.0"
features:
  - scheduling_policies
processes:
  wash:
    kind: atomic
    inputs: {}
    outputs: {}
  incubate:
    kind: atomic
    inputs: {}
    outputs: {}
  main:
    kind: composite
    body:
      nodes:
        - id: wash
          process: wash
        - id: incubate
          process: incubate
      returns: {}
    scheduling:
      policies:
        - during:
            from: wash.end
            to: incubate.start
          prefer:
            kind: min_gap
            value: 0
            unit: min
entry: main
