spec_version: "0.0"
features:
  - scheduling_policies
processes:
  freeze:
    kind: atomic
    inputs: {}
    outputs: {}
  main:
    kind: composite
    body:
      nodes:
        - id: freeze
          process: freeze
      returns: {}
    scheduling:
      policies:
        - during:
            from: freeze.start
            to: freeze.end
          prefer:
            kind: temperature
            value: -80
            unit: C
entry: main
