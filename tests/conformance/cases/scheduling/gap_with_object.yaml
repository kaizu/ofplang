spec_version: "0.0"
features:
  - scheduling_policies
types:
  Sample:
    domain: object
processes:
  main:
    kind: composite
    inputs:
      sample:
        type: Sample
        phase: data
    body:
      nodes: []
      returns:
        sample:
          from: inputs.sample
    outputs:
      sample:
        type: Sample
        phase: data
    scheduling:
      policies:
        - object:
            from: inputs.sample
          during:
            from: self.start
            to: self.end
          prefer:
            kind: max_gap
            value: 10
            unit: min
entry: main
