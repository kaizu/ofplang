spec_version: "0.0"
types:
  Cup:
    domain: object
processes:
  need_cup:
    kind: atomic
    inputs:
      cup:
        type: Cup
        phase: data
    outputs: {}
    objects:
      consume:
        - inputs.cup
  main:
    kind: composite
    body:
      nodes:
        - id: n
          process: need_cup
      returns: {}
entry: main
