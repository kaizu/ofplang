spec_version: "0.0"
types:
  Cup:
    domain: object
processes:
  cup_make:
    kind: atomic
    inputs: {}
    outputs:
      cup:
        type: Cup
        phase: data
    objects:
      create:
        - outputs.cup
  cup_use:
    kind: atomic
    inputs:
      cup:
        type: Cup
        phase: data
    outputs: {}
    objects:
      consume:
        - inputs.cup
  main:
    kind: composite
    body:
      nodes:
        - id: make
          process: cup_make
        - id: use
          process: cup_use
          state:
            cup:
              from: make.cup
      returns: {}
entry: main
